version: "3.8"
services:
  database:
    image: postgres:17-alpine3.23
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:8-alpine3.23
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - database
      - redis
      - rabbitmq
